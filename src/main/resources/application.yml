server:
  port: ${PORT:8080}

spring:
  application:
    name: stockflow-service
    version: "@project.version@"

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.xml

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

app:
  api:
    base: /api/v1