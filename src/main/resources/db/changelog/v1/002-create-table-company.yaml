databaseChangeLog:
  - changeSet:
      id: 002-create-table-company
      author: rhuan.resende
      changes:
        - createTable:
            schemaName: company
            tableName: tb_company
            columns:
              - column:
                  name: co_id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: ds_name
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: nr_document
                  type: VARCHAR(14)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: dt_created_at
                  type: TIMESTAMP
              - column:
                  name: dt_updated_at
                  type: TIMESTAMP
              - column:
                  name: st_deleted
                  type: BOOLEAN