databaseChangeLog:
  - changeSet:
      id: 007-create-table-password-reset-token
      author: rhuan.resende
      changes:
        - createTable:
            schemaName: auth
            tableName: tb_password_reset_token
            columns:
              - column:
                  name: co_id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: co_user
                  type: UUID
                  constraints:
                    nullable: false

              - column:
                  name: ds_token_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: dt_expiration
                  type: TIMESTAMP
                  constraints:
                    nullable: false

              - column:
                  name: st_used
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false

              - column:
                  name: dt_used_at
                  type: TIMESTAMP

              - column:
                  name: dt_created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            schemaName: auth
            tableName: tb_password_reset_token
            indexName: idx_password_reset_user
            columns:
              - column:
                  name: co_user